
on:
  release:
    types: [created]
  push:
  pull_request:



jobs:
  test-package:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: |
            /tmp/.uv-cache
            .venv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}

      - name: run tests locked
        run: |
          uv lock
          uv sync --locked
          uv run pytest
          uv run pydropsonde -c ./dropsonde.cfg
      - name: run tests frozen
        run: |
          uv sync --frozen
          uv run pytest
          uv run pydropsonde -c ./dropsonde.cfg
      - name: Minimize uv cache
        run: uv cache prune --ci


  publish-to-PyPI:
    if: "${{ github.event_name == 'release' }}"
    runs-on: ubuntu-latest
    needs: [test-package]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv build
      # Check that basic features work and we didn't miss to include crucial files
      - name: tests (wheel)
        run: uv run --isolated --no-project -p 3.13 --with dist/*.whl tests/publish_test.py
      - name: tests (source distribution)
        run: uv run --isolated --no-project -p 3.13 --with dist/*.tar.gz tests/publish_test.py
      - run: uv publish --trusted-publishing always
